# 基于 Node.js 的 API 服务容器化部署
services:
  new-api:
    image: calciumion/new-api:latest
    container_name: new-api
    restart: always
    ports:
      - '3000:3000'
    volumes:
      - $docker-path/new-api/data:/data
    environment:
      TZ: Asia/Shanghai
    tty: true
    stdin_open: true
    network_mode: bridge  # 添加推荐的网络模式
