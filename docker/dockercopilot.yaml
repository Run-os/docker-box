# Docker Copilot 管理工具容器化部署
services:
  dockercopilot:
    container_name: docker-copilot
    restart: always
    privileged: true
    network_mode: bridge
    ports:
      - 12712:12712
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./data:/data
    environment:
      - TZ=Asia/Shanghai
      - DOCKER_HOST=unix:///var/run/docker.sock
      - secretKey=$password
    image: 0nlylty/dockercopilot:latest
    labels:
      # 启用 WatchCow 发现
      watchcow.enable: "true"
      
      # 应用标识
      watchcow.appname: "watchcow.docker-copilot"
      watchcow.display_name: "docker-copilot"
      watchcow.desc: "docker-copilot 管理工具，方便备份更新容器"
      watchcow.version: "1.0.0"
      watchcow.maintainer: "WatchCow"
      
      # 网络配置
      watchcow.service_port: "12712"  # 宿主机端口
      watchcow.protocol: "http"
      watchcow.path: "/"
      
      # UI 配置
      watchcow.ui_type: "url"
      watchcow.icon: "https://s2.loli.net/2026/01/19/sWVSiOrX1z5exmn.png"