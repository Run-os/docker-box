# 小米音乐 Docker 版 - 音乐播放与管理
services:
  xiaomusic:
    image: hanxi/xiaomusic:latest
    container_name: xiaomusic
    restart: unless-stopped
    ports:
      - 58090:8090
    environment:
      XIAOMUSIC_PUBLIC_PORT: 58090
    volumes:
      - $docker-path/media/xiaomusic_music:/app/music
      - $docker-path/media/xiaomusic_conf:/app/conf
    network_mode: bridge  # 添加网络模式确保兼容性
    
    labels:
      # 启用 WatchCow 发现
      watchcow.enable: "true"
      
      # 应用标识
      watchcow.appname: "watchcow.xiaomusic"
      watchcow.display_name: "小米音乐"
      watchcow.desc: "小米音乐 Docker 版 - 音乐播放与管理"
      watchcow.version: "1.0.0"
      watchcow.maintainer: "Runos"
      
      # 网络配置
      watchcow.service_port: "58090"  # 宿主机端口
      watchcow.protocol: "http"
      watchcow.path: "/"
      
      # UI 配置
      watchcow.ui_type: "url"
      watchcow.icon: "https://s2.loli.net/2026/01/15/4OGsC3bQPhIoASm.png"