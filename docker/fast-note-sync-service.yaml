# obsidian 同步插件
services:
  fast-note-sync-service:
    image: haierkeys/fast-note-sync-service:latest
    container_name: fast-note-sync-service
    restart: always
    ports:
      - "9000:9000"  # API 端口
      - "9001:9001"  # WebSocket 端口
    volumes:
      - ./storage:/fast-note-sync/storage  # 数据存储
      - ./config:/fast-note-sync/config    # 配置文件
    labels:
      # 启用 WatchCow 发现
      watchcow.enable: "true"
      
      # 应用标识
      watchcow.appname: "watchcow.obsidian"
      watchcow.display_name: "obsidian"
      watchcow.desc: "obsidian 同步插件"
      watchcow.version: "1.0.0"
      watchcow.maintainer: "Runos"
      
      # 网络配置
      watchcow.service_port: "9000"  # 宿主机端口
      watchcow.protocol: "http"
      watchcow.path: "/"
      
      # UI 配置
      watchcow.ui_type: "url"
      watchcow.icon: "https://s2.loli.net/2026/01/21/eudpj4Ytgh3Vbim.png"