# 基于 Windows 10 的容器化环境
services:
  windows:
    image: dockurr/windows
    container_name: windows
    environment:
      VERSION: "10"
      LANGUAGE: "Chinese"  # 设置为中文版Windows
      USERNAME: "$name"
      PASSWORD: "$name@pwd"
    devices:
      - /dev/kvm
      - /dev/net/tun
    cap_add:
      - NET_ADMIN
    ports:
      - 8006:8006
      - 3389:3389/tcp
      - 3389:3389/udp
    volumes:
      - ./windows:/storage
    restart: always
    stop_grace_period: 2m	