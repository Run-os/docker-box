# 基于 Node.js 的 API 服务容器化部署
services:
  new-api:
    image: calciumion/new-api:latest
    container_name: new-api
    restart: always
    ports:
      - '3000:3000'
    volumes:
      - /vol1/1000/Docker/new-api/data:/data
    environment:
      TZ: Asia/Shanghai
    tty: true
    stdin_open: true
    network_mode: bridge  # 添加推荐的网络模式
    
    labels:
      # 启用 WatchCow 发现
      watchcow.enable: "true"
      
      # 应用标识
      watchcow.appname: "watchcow.new-api"
      watchcow.display_name: "New API"
      watchcow.desc: "API 服务容器，提供数据接口服务"
      watchcow.version: "1.0.0"
      watchcow.maintainer: "WatchCow"
      
      # 网络配置
      watchcow.service_port: "3000"  # 宿主机端口
      watchcow.protocol: "http"
      watchcow.path: "/"
      
      # UI 配置
      watchcow.ui_type: "url"
      watchcow.icon: "https://s2.loli.net/2026/01/19/zm7Z4SNEx6apcLd.png"