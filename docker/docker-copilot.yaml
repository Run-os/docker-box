# Docker Copilot 管理工具容器化部署
services:
  dockercopilot:
    container_name: docker-copilot
    restart: always
    privileged: true
    network_mode: bridge
    ports:
      - 12712:12712
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./data:/data
    environment:
      - TZ=Asia/Shanghai
      - DOCKER_HOST=unix:///var/run/docker.sock
      - secretKey=$password
    image: 0nlylty/dockercopilot:latest